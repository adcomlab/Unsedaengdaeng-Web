<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 진행 중 | 운세댕댕</title>
  <script src="/payment-config.js"></script>
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; margin: 0; background: #F8F7FF; color: #111827; }
    .container { max-width: 540px; margin: 0 auto; padding: 16px; }
    .header { padding: 12px 4px 16px; }
    .header h1 { font-size: 18px; font-weight: 700; margin: 0; }
    .meta { color: #6B7280; font-size: 13px; margin-top: 2px; }
    #payment-method, #agreement { background: #FFFFFF; border-radius: 12px; padding: 8px; margin: 8px 0; box-shadow: 0 2px 8px rgba(107, 78, 255, 0.05); }
    .pay-btn, .home-btn { width: 100%; height: 52px; background: #6B4EFF; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; margin-top: 16px; cursor: pointer; }
    .pay-btn:disabled { background: #E5E7EB; color: #9CA3AF; cursor: not-allowed; }
    .err { color: #EF4444; padding: 12px; background: #FEE2E2; border-radius: 10px; margin-top: 12px; font-size: 13px; }
    .success { text-align: center; padding: 40px 16px; }
    .success .icon { width: 80px; height: 80px; border-radius: 50%; background: #6B4EFF; color: white; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; }
    .success h2 { font-size: 22px; margin: 0 0 8px; }
    .success p { color: #6B7280; margin: 4px 0; }
    .loading { text-align: center; padding: 60px 16px; color: #6B4EFF; }
    .spinner { width: 36px; height: 36px; border: 4px solid #EDE9FF; border-top-color: #6B4EFF; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div id="checkout-view" style="display:none;">
      <div class="header">
        <h1 id="title">결제 진행 중...</h1>
        <p class="meta" id="meta"></p>
      </div>
      <div id="payment-method"></div>
      <div id="agreement"></div>
      <button class="pay-btn" id="pay-btn" disabled>결제하기</button>
      <div id="err"></div>
    </div>

    <div id="loading-view" class="loading">
      <div class="spinner"></div>
      <div id="loading-text">결제를 확인하고 있어요...</div>
    </div>

    <div id="success-view" class="success" style="display:none;">
      <div class="icon">✓</div>
      <h2>결제가 완료되었어요</h2>
      <p id="success-meta"></p>
      <p>엽전이 충전되었습니다.</p>
      <button class="home-btn" onclick="goHome()">홈으로 돌아가기</button>
    </div>

    <div id="fail-view" class="success" style="display:none;">
      <div class="icon" style="background:#EF4444;">!</div>
      <h2>결제가 실패했어요</h2>
      <p id="fail-meta"></p>
      <button class="home-btn" style="background:#6B7280;" onclick="goHome()">홈으로 돌아가기</button>
    </div>
  </div>

  <script>
    const SAFE_PAYMENT_SETUP_MESSAGE = '결제 설정을 확인 중입니다. 잠시 후 다시 시도해 주세요.';

    function show(id) {
      ['checkout-view', 'loading-view', 'success-view', 'fail-view'].forEach(v => {
        document.getElementById(v).style.display = (v === id ? 'block' : 'none');
      });
    }

    function goHome() { window.location.href = '/'; }

    function getAccessToken() {
      return sessionStorage.getItem('access_token') || localStorage.getItem('access_token');
    }

    function configuredClientKey(params) {
      const runtimeKey = window.__UNSEDD_PAYMENT_CONFIG__?.tossClientKey || '';
      return runtimeKey || params.get('clientKey') || '';
    }

    function isValidClientKey(clientKey) {
      if (!clientKey) return false;
      if (clientKey.includes('your-') || clientKey.includes('placeholder')) return false;
      return /^(test|live)_gck_/.test(clientKey);
    }

    function isTestClientKey(clientKey) {
      return clientKey.startsWith('test_gck_');
    }

    async function confirmPayment(productId, paymentKey, orderId, amount) {
      show('loading-view');
      const token = getAccessToken();
      try {
        const res = await fetch('https://saju-daengdaeng-server-production-2309.up.railway.app/api/payments/verify-toss', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': token ? `Bearer ${token}` : '',
          },
          body: JSON.stringify({ productId, paymentKey, orderId, amount: parseInt(amount, 10) }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data?.message || '결제 검증 실패');
        document.getElementById('success-meta').textContent =
          `${parseInt(amount, 10).toLocaleString()}원`;
        show('success-view');
      } catch (e) {
        document.getElementById('fail-meta').textContent = e.message || '알 수 없는 오류';
        show('fail-view');
      }
    }

    function failPayment(message) {
      document.getElementById('fail-meta').textContent = message || '결제 실패';
      show('fail-view');
    }

    (async () => {
      const params = new URLSearchParams(window.location.search);

      const paymentKey = params.get('paymentKey');
      if (paymentKey) {
        const orderId = params.get('orderId');
        const amount = params.get('amount');
        const productId = params.get('productId');
        if (!orderId || !amount || !productId) {
          failPayment('결제 정보가 부족합니다.');
          return;
        }
        await confirmPayment(productId, paymentKey, orderId, amount);
        return;
      }

      const code = params.get('code');
      if (code) {
        failPayment(params.get('message') || `결제 실패 (${code})`);
        return;
      }

      show('checkout-view');
      const clientKey = configuredClientKey(params);
      const customerKey = params.get('customerKey');
      const productId = params.get('productId');
      const orderId = params.get('orderId');
      const orderName = params.get('orderName') || '운세댕댕 엽전';
      const amount = parseInt(params.get('amount') || '0', 10);
      const variantKey = params.get('variantKey') || 'DEFAULT';

      const errEl = document.getElementById('err');
      const titleEl = document.getElementById('title');
      const metaEl = document.getElementById('meta');
      const btn = document.getElementById('pay-btn');

      titleEl.textContent = orderName;
      metaEl.textContent = `${amount.toLocaleString()}원`;
      btn.textContent = `${amount.toLocaleString()}원 결제하기`;

      if (!isValidClientKey(clientKey)) {
        errEl.className = 'err';
        errEl.textContent = SAFE_PAYMENT_SETUP_MESSAGE;
        return;
      }

      if (!customerKey || !orderId || !Number.isInteger(amount) || amount <= 0) {
        errEl.className = 'err';
        errEl.textContent = '결제 정보가 부족합니다.';
        return;
      }

      if (location.hostname !== 'localhost' && !location.hostname.startsWith('127.') && isTestClientKey(clientKey)) {
        errEl.className = 'err';
        errEl.textContent = SAFE_PAYMENT_SETUP_MESSAGE;
        return;
      }

      try {
        const tossPayments = TossPayments(clientKey);
        const widgets = tossPayments.widgets({ customerKey });
        await widgets.setAmount({ currency: 'KRW', value: amount });
        await widgets.renderPaymentMethods({ selector: '#payment-method', variantKey });
        try {
          await widgets.renderAgreement({ selector: '#agreement', variantKey: 'AGREEMENT' });
        } catch (_) {
          document.getElementById('agreement').style.display = 'none';
        }
        btn.disabled = false;
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          try {
            const successUrl = `${window.location.origin}/toss-checkout.html?productId=${encodeURIComponent(productId)}`;
            const failUrl = `${window.location.origin}/toss-checkout.html`;
            await widgets.requestPayment({ orderId, orderName, successUrl, failUrl });
          } catch (e) {
            errEl.className = 'err';
            errEl.textContent = e?.message || '결제 요청 실패';
            btn.disabled = false;
          }
        });
      } catch (e) {
        errEl.className = 'err';
        errEl.textContent = SAFE_PAYMENT_SETUP_MESSAGE;
      }
    })();
  </script>
</body>
</html>
